<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 580" width="720" role="img" aria-labelledby="diagram-title diagram-desc">
  <title id="diagram-title">MTG Project — runtime architecture</title>
  <desc id="diagram-desc">The user's browser communicates over HTTPS with the Next.js application running on Vercel. The Next.js application contains React Server Components, hydrated Client Components, API routes for mutations, a Scryfall ingest cron, and the Phase 3+ AI Orchestrator. The Scryfall ingest pulls card data from Scryfall's bulk-data endpoint. Vercel reads from and writes to Supabase Postgres, which hosts pgsodium for BYOK encryption, GIN indexes, and Supabase Auth. In Phase 3 and beyond, the AI Orchestrator calls the Anthropic API using the user's bring-your-own-key Anthropic credential.</desc>

  <style>
    .bg          { fill: #f3e8d2; }
    .surface     { fill: #ede0c4; stroke: #3d2f23; stroke-width: 1.5; }
    .surface-in  { fill: #faf2e0; stroke: #b09775; stroke-width: 1; }
    .surface-p3  { fill: #ede0c4; stroke: #b09775; stroke-width: 1.5; stroke-dasharray: 5 3; }
    .ink         { fill: #2c1810; font-family: Georgia, 'Times New Roman', serif; }
    .ink-muted   { fill: #6a4d38; font-family: Georgia, 'Times New Roman', serif; }
    .label       { fill: #2c1810; font-family: Georgia, 'Trajan Pro', serif; letter-spacing: 0.08em; font-weight: 600; }
    .label-muted { fill: #6a4d38; font-family: Georgia, 'Trajan Pro', serif; letter-spacing: 0.08em; font-weight: 600; }
    .arrow-line  { stroke: #a8842a; stroke-width: 2; fill: none; }
    .arrow-dash  { stroke: #a8842a; stroke-width: 2; fill: none; stroke-dasharray: 6 4; }
    .arrow-head  { fill: #a8842a; }
    .edge-label  { fill: #6a4d38; font-family: Georgia, serif; font-style: italic; }

    @media (prefers-color-scheme: dark) {
      .bg          { fill: #1a1410; }
      .surface     { fill: #221a14; stroke: #5a4636; }
      .surface-in  { fill: #2a2018; stroke: #5a4636; }
      .surface-p3  { fill: #221a14; stroke: #8a7240; }
      .ink         { fill: #f0e3cd; }
      .ink-muted   { fill: #b8a78a; }
      .label       { fill: #f0e3cd; }
      .label-muted { fill: #b8a78a; }
      .arrow-line  { stroke: #c4a059; }
      .arrow-dash  { stroke: #c4a059; }
      .arrow-head  { fill: #c4a059; }
      .edge-label  { fill: #b8a78a; }
    }
  </style>

  <defs>
    <marker id="head" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" class="arrow-head"/>
    </marker>
  </defs>

  <rect width="720" height="580" class="bg"/>

  <!-- Top row: Browser (left), Scryfall (right) -->
  <rect x="40" y="30" width="260" height="100" rx="8" class="surface"/>
  <text x="170" y="60" text-anchor="middle" class="label" font-size="14">USER'S BROWSER</text>
  <rect x="64" y="78" width="212" height="36" rx="6" class="surface-in"/>
  <text x="170" y="101" text-anchor="middle" class="ink" font-size="13">React — Client Components</text>

  <rect x="420" y="30" width="260" height="100" rx="8" class="surface"/>
  <text x="550" y="60" text-anchor="middle" class="label" font-size="14">SCRYFALL</text>
  <text x="550" y="84" text-anchor="middle" class="ink-muted" font-size="12">external · api.scryfall.com</text>
  <text x="550" y="104" text-anchor="middle" class="ink-muted" font-size="12">bulk-data endpoint</text>

  <!-- Middle: Vercel container with Next.js details -->
  <rect x="40" y="190" width="640" height="220" rx="8" class="surface"/>
  <text x="360" y="220" text-anchor="middle" class="label" font-size="15">VERCEL</text>

  <rect x="80" y="240" width="560" height="155" rx="6" class="surface-in"/>
  <text x="360" y="265" text-anchor="middle" class="label-muted" font-size="13">Next.js App Router</text>

  <text x="120" y="295" class="ink" font-size="12.5">• React Server Components</text>
  <text x="120" y="316" class="ink" font-size="12.5">• Client Components (hydrated)</text>
  <text x="120" y="337" class="ink" font-size="12.5">• API routes (mutations)</text>
  <text x="120" y="358" class="ink" font-size="12.5">• Scryfall ingest cron</text>
  <text x="320" y="358" class="ink-muted" font-size="11.5">Vercel Cron · daily</text>
  <text x="120" y="379" class="ink" font-size="12.5">• AI Orchestrator</text>
  <text x="262" y="379" class="ink-muted" font-size="11.5">Phase 3+</text>

  <!-- Bottom row: Supabase (left), Anthropic (right, dashed for Phase 3+) -->
  <rect x="40" y="470" width="300" height="100" rx="8" class="surface"/>
  <text x="190" y="500" text-anchor="middle" class="label" font-size="14">SUPABASE POSTGRES</text>
  <text x="190" y="522" text-anchor="middle" class="ink-muted" font-size="12">+ pgsodium  (BYOK encryption)</text>
  <text x="190" y="542" text-anchor="middle" class="ink-muted" font-size="12">+ GIN indexes  ·  + Auth</text>

  <rect x="380" y="470" width="300" height="100" rx="8" class="surface-p3"/>
  <text x="530" y="500" text-anchor="middle" class="label-muted" font-size="14">ANTHROPIC API</text>
  <text x="530" y="522" text-anchor="middle" class="ink-muted" font-size="12">Phase 3+</text>
  <text x="530" y="542" text-anchor="middle" class="ink-muted" font-size="12">user's BYOK key</text>

  <!-- Arrows -->
  <!-- Browser → Vercel -->
  <line x1="170" y1="130" x2="170" y2="186" class="arrow-line" marker-end="url(#head)"/>
  <text x="180" y="162" class="edge-label" font-size="11">HTTPS</text>

  <!-- Scryfall → Vercel -->
  <line x1="550" y1="130" x2="550" y2="186" class="arrow-line" marker-end="url(#head)"/>
  <text x="560" y="162" class="edge-label" font-size="11">bulk fetch</text>

  <!-- Vercel → Supabase -->
  <line x1="190" y1="410" x2="190" y2="466" class="arrow-line" marker-end="url(#head)"/>
  <text x="200" y="442" class="edge-label" font-size="11">Prisma</text>

  <!-- Vercel → Anthropic (Phase 3+, dashed) -->
  <line x1="530" y1="410" x2="530" y2="466" class="arrow-dash" marker-end="url(#head)"/>
  <text x="540" y="442" class="edge-label" font-size="11">Phase 3+</text>
</svg>
